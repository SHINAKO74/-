<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LEXICON — 英単語学習</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0d0b;--card:#1a1814;--gold:#c9a84c;--gold-dim:#7a6230;--cream:#f5f0e8;--sage:#7aaa7a;--red:#c96450;--muted:#5a5650;--text-dark:#1a1610}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
header{width:100%;padding:16px 22px 13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(201,168,76,0.15);position:relative;z-index:10;flex-wrap:wrap}
.logo{font-family:'IM Fell English SC',serif;font-size:20px;letter-spacing:0.2em;color:var(--gold)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap}

.mode-tabs{display:flex;border:1px solid rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.mode-tab{background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:7px 13px;cursor:pointer;transition:all 0.15s;border-right:1px solid rgba(255,255,255,0.07)}
.mode-tab:last-child{border-right:none}
.mode-tab.active{background:rgba(201,168,76,0.12);color:var(--gold)}
.history-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;padding:7px 12px;border-radius:2px;cursor:pointer;transition:all 0.15s}
.history-btn:hover{color:var(--cream);border-color:rgba(255,255,255,0.25)}
.progress-section{width:100%;max-width:680px;padding:16px 22px 0;position:relative;z-index:1}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.progress-track{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:1px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative}
.progress-dot{position:absolute;right:-3px;top:-3px;width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold)}
.score-pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:11px;letter-spacing:0.07em;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill-know{background:rgba(122,170,122,0.12);color:var(--sage);border:1px solid rgba(122,170,122,0.2)}
.pill-unknown{background:rgba(201,100,80,0.1);color:var(--red);border:1px solid rgba(201,100,80,0.2)}
.pill-master{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px 18px;width:100%;position:relative;z-index:1}
.card-wrap{width:560px;max-width:100%;margin-bottom:26px;position:relative;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.card{width:100%;min-height:300px;background:var(--card);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 40px;box-shadow:0 18px 48px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04);position:relative;cursor:pointer;transition:background 0.1s,box-shadow 0.1s,transform 0.1s}
.card::before,.card::after{content:'';position:absolute;width:22px;height:22px}
.card::before{top:13px;left:13px;border-top:1.5px solid var(--gold-dim);border-left:1.5px solid var(--gold-dim)}
.card::after{bottom:13px;right:13px;border-bottom:1.5px solid var(--gold-dim);border-right:1.5px solid var(--gold-dim)}
.card.swipe-left{background:#2a1410;box-shadow:0 18px 48px rgba(0,0,0,0.55),-4px 0 24px rgba(201,100,80,0.25),0 0 0 1px rgba(201,100,80,0.2);transform:rotate(-3deg) translateX(-8px)}
.card.swipe-right{background:#10221a;box-shadow:0 18px 48px rgba(0,0,0,0.55),4px 0 24px rgba(122,170,122,0.25),0 0 0 1px rgba(122,170,122,0.2);transform:rotate(3deg) translateX(8px)}
.swipe-label{position:absolute;top:18px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600;opacity:0;transition:opacity 0.1s;pointer-events:none;padding:4px 11px;border-radius:2px}
.swipe-label-left{left:16px;color:var(--red);border:1px solid rgba(201,100,80,0.4);background:rgba(201,100,80,0.1)}
.swipe-label-right{right:16px;color:var(--sage);border:1px solid rgba(122,170,122,0.4);background:rgba(122,170,122,0.1)}
.card.swipe-left .swipe-label-left{opacity:1}
.card.swipe-right .swipe-label-right{opacity:1}
.card-number{position:absolute;top:13px;right:17px;font-size:10px;letter-spacing:0.2em;opacity:0.3}
.master-badge{position:absolute;top:13px;left:15px;font-size:10px;letter-spacing:0.15em;color:var(--gold);opacity:0;transition:opacity 0.3s;text-transform:uppercase}
.master-badge.show{opacity:0.7}
.state-dots{display:flex;gap:6px;position:absolute;bottom:14px;left:50%;transform:translateX(-50%)}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.2s}
.dot.active{background:var(--gold)}
.card-content{width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadeSlideIn 0.22s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.s-cat{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;opacity:0.38;margin-bottom:14px}
.s-word{font-family:'Playfair Display',serif;font-size:50px;font-weight:700;line-height:1;color:var(--cream);margin-bottom:10px}
.s-ph{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;opacity:0.35;margin-bottom:10px}
.speak-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;color:var(--cream);opacity:0.3;transition:opacity 0.15s}
.speak-btn:hover{opacity:0.65}
.hint-text{position:absolute;bottom:15px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.18}
.s-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--sage);opacity:0.6;margin-bottom:12px}
.s-ja{font-size:36px;font-weight:300;color:var(--cream);margin-bottom:6px;line-height:1.2}
.s-pos{font-size:11px;color:var(--sage);opacity:0.65;font-style:italic}
.s-ex-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);opacity:0.55;margin-bottom:16px}
.s-ex-en{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--cream);opacity:0.8;line-height:1.65;margin-bottom:12px}
.s-ex-ja{font-size:13px;color:var(--cream);opacity:0.38;line-height:1.6}
.action-row{display:flex;gap:12px}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;padding:14px 28px;border:none;border-radius:2px;cursor:pointer;transition:all 0.18s;font-weight:500}
.btn-unknown{background:rgba(201,100,80,0.1);color:var(--red);border:1px solid rgba(201,100,80,0.3)}
.btn-unknown:active{background:rgba(201,100,80,0.25)}
.btn-know{background:rgba(122,170,122,0.12);color:var(--sage);border:1px solid rgba(122,170,122,0.3)}
.btn-know:active{background:rgba(122,170,122,0.28)}
.btn-skip{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.07);padding:14px 15px}
.swipe-hints{display:none;justify-content:space-between;width:100%;margin-top:13px;font-size:11px;letter-spacing:0.07em;color:var(--muted);opacity:0.4;padding:0 4px}
.key-hints{margin-top:16px;display:flex;gap:16px;opacity:0.27;font-size:11px;letter-spacing:0.08em}
.key-hint{display:flex;align-items:center;gap:5px}
.key{border:1px solid currentColor;border-radius:3px;padding:2px 6px;font-size:10px}
.complete-screen{display:none;flex-direction:column;align-items:center;text-align:center;animation:fadeIn 0.5s ease}
.complete-screen.visible{display:flex}
.card-wrap.hidden,.action-row.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.complete-title{font-family:'IM Fell English SC',serif;font-size:38px;color:var(--gold);margin-bottom:8px;letter-spacing:0.05em}
.complete-sub{color:var(--muted);font-size:12px;letter-spacing:0.12em;margin-bottom:32px}
.complete-stats{display:flex;gap:30px;margin-bottom:36px}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px}
.stat-num{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;line-height:1}
.stat-know .stat-num{color:var(--sage)}.stat-unknown .stat-num{color:var(--red)}.stat-master .stat-num{color:var(--gold)}
.stat-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
.btn-restart{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;padding:13px 36px;border-radius:2px;cursor:pointer;transition:all 0.18s}
.btn-restart:hover{background:rgba(201,168,76,0.08);border-color:var(--gold)}
.history-panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);justify-content:flex-end}
.history-panel.open{display:flex;animation:fadeIn 0.2s ease}
.history-drawer{width:min(500px,100vw);height:100%;background:#131210;border-left:1px solid rgba(201,168,76,0.12);display:flex;flex-direction:column;animation:slideInR 0.25s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:none}}
.history-header{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;gap:10px}
.history-title{font-family:'IM Fell English SC',serif;font-size:18px;color:var(--gold);letter-spacing:0.1em}
.history-header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.copy-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all 0.15s}
.copy-btn:hover{color:var(--cream);border-color:rgba(255,255,255,0.3)}
.copy-btn.copied{color:var(--sage);border-color:rgba(122,170,122,0.4)}
.history-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;transition:color 0.15s}
.history-close:hover{color:var(--cream)}
.history-filters{padding:11px 16px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.04)}
.filter-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s}
.filter-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,168,76,0.08)}
.history-list{flex:1;overflow-y:auto;padding:4px 0}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.history-item{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.03)}
.h-badge{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.h-badge.know{background:rgba(122,170,122,0.15);color:var(--sage);border:1px solid rgba(122,170,122,0.2)}
.h-badge.unknown{background:rgba(201,100,80,0.12);color:var(--red);border:1px solid rgba(201,100,80,0.2)}
.h-badge.master{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
.h-word{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--cream)}
.h-ja{font-size:12px;color:var(--muted);margin-top:1px}
.h-time{margin-left:auto;font-size:11px;opacity:0.32;white-space:nowrap}
.history-empty{padding:56px 20px;text-align:center;color:var(--muted);font-size:13px;letter-spacing:0.1em}
.history-count{padding:8px 20px 6px;font-size:11px;color:var(--muted);letter-spacing:0.08em;opacity:0.6}
@media(max-width:580px){
  header{padding:12px 13px;gap:7px}.logo{font-size:17px}.header-right{gap:6px}
  .deck-select{font-size:11px}.mode-tab{padding:6px 9px;font-size:10px}.history-btn{font-size:10px;padding:6px 9px}
  .progress-section{padding:12px 13px 0}
  main{padding:16px 12px 14px}
  .card{min-height:260px;padding:28px 22px}.s-word{font-size:36px}.s-ja{font-size:28px}.s-ex-en{font-size:15px}.s-ex-ja{font-size:12px}
  .action-row{width:100%;gap:8px}.btn{flex:1;padding:15px 6px;font-size:11px;letter-spacing:0.06em}.btn-skip{flex:0 0 auto;padding:15px 11px}
  .key-hints{display:none}.swipe-hints{display:flex}
}
</style>
</head>
<body>
<header>
  <div class="logo">Lexicon</div>
  <div class="header-right">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('flash')">通常</button>
      <button class="mode-tab" onclick="setMode('review')">復習のみ</button>
    </div>
    <button class="history-btn" onclick="openHistory()">履歴</button>
  </div>
</header>
<div class="progress-section">
  <div class="progress-meta"><span id="progress-label">0 / 0</span><span id="progress-pct">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"><div class="progress-dot"></div></div></div>
  <div class="score-pills">
    <div class="pill pill-know"><div class="pill-dot"></div>正解: <span id="score-know">0</span></div>
    <div class="pill pill-unknown"><div class="pill-dot"></div>要復習: <span id="score-unknown">0</span></div>
    <div class="pill pill-master"><div class="pill-dot"></div>習得: <span id="score-master">0</span></div>
  </div>
</div>
<main>
  <div class="card-wrap" id="card-wrap">
    <div class="card" id="card">
      <div class="swipe-label swipe-label-left">✕ 要復習</div>
      <div class="swipe-label swipe-label-right">○ 正解</div>
      <div class="master-badge" id="master-badge">★ 習得済み</div>
      <div class="card-number" id="card-num">1 / 549</div>
      <div class="card-content" id="card-content"></div>
      <div class="state-dots" id="state-dots">
        <div class="dot active" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
      </div>
    </div>
  </div>
  <div class="action-row" id="action-row">
    <button class="btn btn-unknown" onclick="grade(false)">✕ 要復習</button>
    <button class="btn btn-skip" onclick="nextCard()">→</button>
    <button class="btn btn-know" onclick="grade(true)">○ 正解</button>
  </div>
  <div class="key-hints">
    <div class="key-hint"><span class="key">Space</span>次へ</div>
    <div class="key-hint"><span class="key">←</span>要復習</div>
    <div class="key-hint"><span class="key">→</span>正解</div>
  </div>
  <div class="swipe-hints"><span>← 要復習</span><span>タップで次へ</span><span>正解 →</span></div>
  <div class="complete-screen" id="complete-screen">
    <div class="complete-title">Complete</div>
    <div class="complete-sub">セッション終了</div>
    <div class="complete-stats">
      <div class="stat stat-know"><div class="stat-num" id="final-know">0</div><div class="stat-label">正解</div></div>
      <div class="stat stat-unknown"><div class="stat-num" id="final-unknown">0</div><div class="stat-label">要復習</div></div>
      <div class="stat stat-master"><div class="stat-num" id="final-master">0</div><div class="stat-label">習得</div></div>
    </div>
    <button class="btn-restart" onclick="restart()">もう一度</button>
  </div>
</main>
<div class="history-panel" id="history-panel" onclick="handlePanelBg(event)">
  <div class="history-drawer">
    <div class="history-header">
      <div class="history-title">History</div>
      <div class="history-header-right">
        <button class="copy-btn" id="copy-btn" onclick="copyHistory()">コピー</button>
        <button class="history-close" onclick="closeHistory()">✕</button>
      </div>
    </div>
    <div class="history-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('know',this)">正解</button>
      <button class="filter-btn" onclick="setFilter('unknown',this)">要復習</button>
      <button class="filter-btn" onclick="setFilter('master',this)">習得済み</button>
    </div>
    <div class="history-count" id="history-count"></div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<script>
const WORDS = [
{en:"aggressive",ph:"/əˈɡrɛsɪv/",ja:"攻撃的な",pos:"形容詞",cat:"adjective",exEn:"His aggressive behavior alarmed his colleagues.",exJa:"彼の攻撃的な行動は同僚を不安にさせた。"},
{en:"organism",ph:"/ˈɔːɡənɪzəm/",ja:"生物",pos:"名詞",cat:"noun",exEn:"Every organism needs energy to survive.",exJa:"すべての生物は生存するためにエネルギーが必要だ。"},
{en:"astronomer",ph:"/əˈstrɒnəmər/",ja:"天文学者",pos:"名詞",cat:"noun",exEn:"The astronomer discovered a new planet.",exJa:"その天文学者は新しい惑星を発見した。"},
{en:"confront",ph:"/kənˈfrʌnt/",ja:"直面する",pos:"動詞",cat:"verb",exEn:"We must confront this problem directly.",exJa:"私たちはこの問題に直接向き合わなければならない。"},
{en:"shortage",ph:"/ˈʃɔːtɪdʒ/",ja:"不足",pos:"名詞",cat:"noun",exEn:"There is a severe shortage of clean water.",exJa:"きれいな水が深刻に不足している。"},
{en:"profound",ph:"/prəˈfaʊnd/",ja:"深い",pos:"形容詞",cat:"adjective",exEn:"Reading had a profound effect on her thinking.",exJa:"読書は彼女の思考に深い影響を与えた。"},
{en:"civil",ph:"/ˈsɪvəl/",ja:"市民の",pos:"形容詞",cat:"adjective",exEn:"Civil rights must be protected by law.",exJa:"市民の権利は法律によって守られなければならない。"},
{en:"physician",ph:"/fɪˈzɪʃən/",ja:"内科医",pos:"名詞",cat:"noun",exEn:"The physician examined the patient carefully.",exJa:"その内科医は患者を丁寧に診察した。"},
{en:"agency",ph:"/ˈeɪdʒənsi/",ja:"機関",pos:"名詞",cat:"noun",exEn:"The government agency released a new report.",exJa:"政府機関が新しい報告書を発表した。"},
{en:"attribute",ph:"/ˈætrɪbjuːt/",ja:"〜に帰する",pos:"動詞",cat:"verb",exEn:"She attributed her success to hard work.",exJa:"彼女は自分の成功を努力のおかげだと考えた。"},
{en:"trait",ph:"/treɪt/",ja:"特徴",pos:"名詞",cat:"noun",exEn:"Honesty is an admirable trait.",exJa:"正直さは称賛に値する特徴だ。"},
{en:"hence",ph:"/hɛns/",ja:"それゆえ",pos:"副詞",cat:"adverb",exEn:"He was ill; hence he could not attend.",exJa:"彼は病気だった。それゆえ出席できなかった。"},
{en:"prosperity",ph:"/prɒˈspɛrɪti/",ja:"繁栄",pos:"名詞",cat:"noun",exEn:"The nation enjoyed a period of great prosperity.",exJa:"その国は大きな繁栄の時代を享受した。"},

function speak(word){

  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.85;

}

  let pool=[...WORDS];
  if(currentMode==='review'){
    const nm=pool.filter(c=>!wordStats[c.en]?.mastered);
    pool=nm.length?nm:[...WORDS];
  }
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  cards=pool;currentIndex=0;cardState=0;
  scoreKnow=scoreUnknown=scoreMaster=0;
  Object.keys(wordStats).forEach(k=>{wordStats[k].firstAttemptInSession=true;});
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-wrap').classList.remove('hidden');
  document.getElementById('action-row').classList.remove('hidden');
  updateUI();renderCard();
}

function renderCard(){
  if(currentIndex>=cards.length){showComplete();return;}
  const c=cards[currentIndex];
  const stat=wordStats[c.en];
  document.getElementById('card-num').textContent=`${currentIndex+1} / ${cards.length}`;
  document.getElementById('master-badge').classList.toggle('show',!!(stat?.mastered));
  for(let i=0;i<3;i++)document.getElementById('dot'+i).classList.toggle('active',i===cardState);
  const content=document.getElementById('card-content');
  let html='';
  if(cardState===0){
    html=`<div class="s-cat">${c.cat}</div><div class="s-word">${c.en}</div><div class="s-ph">${c.ph}</div><button class="speak-btn" id="speak-btn">🔊</button><div class="hint-text">タップして意味を確認</div>`;
  }else if(cardState===1){
    html=`<div class="s-label">意味</div><div class="s-ja">${c.ja}</div><div class="s-pos">${c.cat} — ${c.pos}</div><div class="hint-text">タップして例文を確認</div>`;
  }else{
    html=`<div class="s-ex-label">例文</div><div class="s-ex-en">"${c.exEn}"</div><div class="s-ex-ja">「${c.exJa}」</div>`;
  }
  content.innerHTML=html;
  const sb=document.getElementById('speak-btn');
  if(sb){
    sb.addEventListener('click',e=>{e.stopPropagation();speak(c.en);});
    sb.addEventListener('touchend',e=>{e.stopPropagation();speak(c.en);},{passive:true});
  }
  if(cardState===2&&didInteract)setTimeout(()=>speak(c.exEn),150);
}

function advanceState(){
  cardState=(cardState+1)%3;
  const content=document.getElementById('card-content');
  content.style.animation='none';void content.offsetWidth;content.style.animation='fadeSlideIn 0.22s ease';
  renderCard();
}

function grade(known,fromSwipe=false){
  const c=cards[currentIndex];
  if(!wordStats[c.en])wordStats[c.en]={consecutiveCorrect:0,mastered:false,firstAttemptInSession:true};
  const stat=wordStats[c.en];
  let result;
  if(known){
    const isFirst=stat.firstAttemptInSession;
    stat.consecutiveCorrect++;stat.firstAttemptInSession=false;
    const nowMasters=isFirst||stat.consecutiveCorrect>=2;
    if(nowMasters&&!stat.mastered){stat.mastered=true;scoreMaster++;}
    result=stat.mastered?'master':'know';scoreKnow++;
  }else{
    stat.consecutiveCorrect=0;stat.firstAttemptInSession=false;
    result='unknown';scoreUnknown++;
  }
  history.unshift({en:c.en,ja:c.ja,pos:c.pos,result,time:Date.now()});
  try{localStorage.setItem('lex_history',JSON.stringify(history.slice(0,2500)));}catch(e){}
  history=history.slice(0,2500);
  currentIndex++;cardState=0;updateUI();renderCard();
}

function nextCard(){
  const c=cards[currentIndex];
  if(c&&!wordStats[c.en])wordStats[c.en]={consecutiveCorrect:0,mastered:false,firstAttemptInSession:false};
  currentIndex++;cardState=0;updateUI();renderCard();
}

function updateUI(){
  const total=cards.length,done=currentIndex,pct=total?Math.round(done/total*100):0;
  document.getElementById('progress-label').textContent=`${done} / ${total}`;
  document.getElementById('progress-pct').textContent=`${pct}%`;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('score-know').textContent=scoreKnow;
  document.getElementById('score-unknown').textContent=scoreUnknown;
  document.getElementById('score-master').textContent=scoreMaster;
}

function showComplete(){
  document.getElementById('complete-screen').classList.add('visible');
  document.getElementById('card-wrap').classList.add('hidden');
  document.getElementById('action-row').classList.add('hidden');
  document.getElementById('final-know').textContent=scoreKnow;
  document.getElementById('final-unknown').textContent=scoreUnknown;
  document.getElementById('final-master').textContent=scoreMaster;
}

function restart(){initDeck();}
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['flash','review'][i]===mode));
  initDeck();
}

function openHistory(){renderHistory();document.getElementById('history-panel').classList.add('open');}
function closeHistory(){document.getElementById('history-panel').classList.remove('open');}
function handlePanelBg(e){if(e.target===document.getElementById('history-panel'))closeHistory();}
function setFilter(f,btn){
  historyFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderHistory();
}
function renderHistory(){
  const items=historyFilter==='all'?history:history.filter(h=>h.result===historyFilter);
  document.getElementById('history-count').textContent=`${items.length}件`;
  if(!items.length){document.getElementById('history-list').innerHTML='<div class="history-empty">まだ記録がありません</div>';return;}
  const icons={know:'○',unknown:'✕',master:'★'};
  document.getElementById('history-list').innerHTML=items.map(h=>`
    <div class="history-item">
      <div class="h-badge ${h.result}">${icons[h.result]}</div>
      <div><div class="h-word">${h.en}</div><div class="h-ja">${h.ja}　<span style="opacity:0.45;font-style:italic;font-size:11px">${h.pos}</span></div></div>
      <div class="h-time">${fmtTime(h.time)}</div>
    </div>`).join('');
}
function fmtTime(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return'たった今';if(m<60)return`${m}分前`;
  const h=Math.floor(m/60);if(h<24)return`${h}時間前`;
  const dt=new Date(ts);return`${dt.getMonth()+1}/${dt.getDate()}`;
}
function copyHistory(){
  const items=historyFilter==='all'?history:history.filter(h=>h.result===historyFilter);
  if(!items.length){alert('コピーする履歴がありません');return;}
  const labels={know:'正解',unknown:'要復習',master:'習得済み'};
  const text=items.map(h=>`[${labels[h.result]}] ${h.en}　${h.ja}　(${h.pos})　${fmtTime(h.time)}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='コピー完了';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=document.getElementById('copy-btn');
    btn.textContent='コピー完了';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('copied');},2000);
  });
}

let txStart=0,tyStart=0,tMoved=false,tHandled=false;
const cardEl=document.getElementById('card');
cardEl.addEventListener('touchstart',e=>{
  txStart=e.touches[0].clientX;tyStart=e.touches[0].clientY;
  tMoved=false;tHandled=false;
},{passive:true});
cardEl.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txStart,dy=e.touches[0].clientY-tyStart;
  if(Math.abs(dx)>7||Math.abs(dy)>7)tMoved=true;
  if(Math.abs(dx)>20&&Math.abs(dx)>Math.abs(dy)){
    cardEl.classList.toggle('swipe-left',dx<0);cardEl.classList.toggle('swipe-right',dx>0);
  }else{cardEl.classList.remove('swipe-left','swipe-right');}
},{passive:true});
cardEl.addEventListener('touchend',e=>{
  tHandled=true;
  cardEl.classList.remove('swipe-left','swipe-right');
  const dx=e.changedTouches[0].clientX-txStart,dy=e.changedTouches[0].clientY-tyStart;
  if(e.target.closest('#speak-btn'))return;
  if(!tMoved){
    if(!didInteract)didInteract=true;
    if(cardState===0){const c=cards[currentIndex];if(c)speak(c.en);}
    advanceState();
  }else if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    grade(dx>0,true);
  }
},{passive:true});
cardEl.addEventListener('click',e=>{
  if(tHandled){tHandled=false;return;}
  if(e.target.closest('#speak-btn'))return;
  if(!didInteract)didInteract=true;
  if(cardState===0){const c=cards[currentIndex];if(c)speak(c.en);}
  advanceState();
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('history-panel').classList.contains('open')){if(e.key==='Escape')closeHistory();return;}
  if(e.code==='Space'){e.preventDefault();advanceState();}
  if(e.key==='ArrowRight')grade(true);
  if(e.key==='ArrowLeft')grade(false);
});

initDeck();
</script>
</body>
</html>
